<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .def{
            background: orange;
            color: #fff;
            padding: 30px;
            margin: 10px 0;
            position: static;
        }
        .absolute{
            background: blue;
            position: absolute;
            top: 30px;
            right: 0;

        }
        .fixed{
            background: brown;
            position: fixed;
            z-index: -200;
        }
        .relative{
            position: relative;
            top: 30px;
            background: yellowgreen;
        }
        .sticky{
            position: sticky;
            top: 20px;
            background: black;
        }
        /* transition */
        .btn{
            background:red;            padding: 10px 30px;
            border: 0;
            border-radius: 10px;
            transition: 1s;
            
            &:hover{
                background: black;
                transform: scale(1.05);
            }
        }
        .card{
            width: 200px;
            border-radius: 10px;
            box-shadow: 0 0 12px 5px #00000045;
            overflow: hidden;
        }
        .card img{
            display: block;
            margin: auto;
            transition: .5s;
            &:hover{
                transform: scale(1.1);
            }
        }
        .box{
            width: 30px;
            height: 30px;
            background: black;
            border-radius: 5px;
            transform: rotate(45deg);
            transform: rotateX(180deg);
            transform: rotateY(180deg);

            /* translate */
            translate: 30px 50px;
            color: red;
        }
        .box1{
            padding: 30px;
            background: #000;
            margin: 10px;
            animation: ani_1 5s infinite;
        }
        @keyframes ani_1{
            0%{background: red;}
            50%{background: #000;}
            100%{background: #099;}
        }
        .circle{
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 4px solid #009;
            border-top-color: #00009945;
            animation: spinner 1s infinite linear;
        }
        @keyframes spinner{
            0%{transform: rotate(0deg);}
            100%{transform: rotate(360deg);}
        }

    </style>
</head>
<body>
    <marquee behaviour="" direction="">
        <section style="display: flex;"></section>
        <div>item1</div>
        </section>
    </marquee>
    <div class="circle"></div>
    <!-- animation -->
    <div class="box1"></div>

    <!-- transform -->
    <div class="box"></div>
    <!--transition  -->
    <button class="btn" type="button">proceed</button>
    <div class="card">
        <img src="river.jpg" width="100%">
    </div>
    <!-- position -->
     <div class="def">Lorem ipsum dolor sit.</div>
     <div class="def absolute">Lorem ipsum dolor sit.</div>
     <div class="def sticky">Lorem ipsum dolor sit.</div>
     <div class="def fixed">Lorem ipsum dolor sit.</div>
     <div class="def">Lorem ipsum dolor sit.</div>
     <div class="def relative">Lorem ipsum dolor sit.</div>
     <div class="def">Lorem ipsum dolor sit.</div>
     <div class="def ">Lorem ipsum dolor sit.</div>
     <div class="def">Lorem ipsum dolor sit.</div>
     <div class="def">Lorem ipsum dolor sit.</div>
</body>
</html>
